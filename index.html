<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="theme-color" content="#0A0A0B" />
<title>Recur — Recursive Camera</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; height: 100%; width: 100%; background: #0A0A0B; overflow: hidden;
    font-family: -apple-system, "SF Pro", Inter, system-ui, sans-serif; color: #F2F2F0;
    -webkit-tap-highlight-color: transparent; -webkit-user-select: none; user-select: none;
    overscroll-behavior: none; touch-action: manipulation; }
  * { box-sizing: border-box; }
  input[type="range"] { -webkit-appearance: none; appearance: none; background: transparent; }
  input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 28px; height: 28px; background: transparent; cursor: pointer; }
  input[type="range"]::-moz-range-thumb { width: 28px; height: 28px; background: transparent; cursor: pointer; border: none; }
  button { font-family: inherit; }
  ::-webkit-scrollbar { display: none; }
  #root { position: fixed; inset: 0; }
</style>
</head>
<body>

<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" data-presets="react">

// ====== ios-frame.jsx ======

// iOS.jsx — Simplified iOS 26 (Liquid Glass) device frame
// Based on the iOS 26 UI Kit + Figma status bar spec. No assets, no deps.
// Exports: IOSDevice, IOSStatusBar, IOSNavBar, IOSGlassPill, IOSList, IOSListRow, IOSKeyboard

// ─────────────────────────────────────────────────────────────
// Status bar
// ─────────────────────────────────────────────────────────────
function IOSStatusBar({ dark = false, time = '9:41' }) {
  const c = dark ? '#fff' : '#000';
  return (
    <div style={{
      display: 'flex', gap: 154, alignItems: 'center', justifyContent: 'center',
      padding: '21px 24px 19px', boxSizing: 'border-box',
      position: 'relative', zIndex: 20, width: '100%',
    }}>
      <div style={{ flex: 1, height: 22, display: 'flex', alignItems: 'center', justifyContent: 'center', paddingTop: 1.5 }}>
        <span style={{
          fontFamily: '-apple-system, "SF Pro", system-ui', fontWeight: 590,
          fontSize: 17, lineHeight: '22px', color: c,
        }}>{time}</span>
      </div>
      <div style={{ flex: 1, height: 22, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 7, paddingTop: 1, paddingRight: 1 }}>
        <svg width="19" height="12" viewBox="0 0 19 12">
          <rect x="0" y="7.5" width="3.2" height="4.5" rx="0.7" fill={c}/>
          <rect x="4.8" y="5" width="3.2" height="7" rx="0.7" fill={c}/>
          <rect x="9.6" y="2.5" width="3.2" height="9.5" rx="0.7" fill={c}/>
          <rect x="14.4" y="0" width="3.2" height="12" rx="0.7" fill={c}/>
        </svg>
        <svg width="17" height="12" viewBox="0 0 17 12">
          <path d="M8.5 3.2C10.8 3.2 12.9 4.1 14.4 5.6L15.5 4.5C13.7 2.7 11.2 1.5 8.5 1.5C5.8 1.5 3.3 2.7 1.5 4.5L2.6 5.6C4.1 4.1 6.2 3.2 8.5 3.2Z" fill={c}/>
          <path d="M8.5 6.8C9.9 6.8 11.1 7.3 12 8.2L13.1 7.1C11.8 5.9 10.2 5.1 8.5 5.1C6.8 5.1 5.2 5.9 3.9 7.1L5 8.2C5.9 7.3 7.1 6.8 8.5 6.8Z" fill={c}/>
          <circle cx="8.5" cy="10.5" r="1.5" fill={c}/>
        </svg>
        <svg width="27" height="13" viewBox="0 0 27 13">
          <rect x="0.5" y="0.5" width="23" height="12" rx="3.5" stroke={c} strokeOpacity="0.35" fill="none"/>
          <rect x="2" y="2" width="20" height="9" rx="2" fill={c}/>
          <path d="M25 4.5V8.5C25.8 8.2 26.5 7.2 26.5 6.5C26.5 5.8 25.8 4.8 25 4.5Z" fill={c} fillOpacity="0.4"/>
        </svg>
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Liquid glass pill — blur + tint + shine
// ─────────────────────────────────────────────────────────────
function IOSGlassPill({ children, dark = false, style = {} }) {
  return (
    <div style={{
      height: 44, minWidth: 44, borderRadius: 9999,
      position: 'relative', overflow: 'hidden',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      boxShadow: dark
        ? '0 2px 6px rgba(0,0,0,0.35), 0 6px 16px rgba(0,0,0,0.2)'
        : '0 1px 3px rgba(0,0,0,0.07), 0 3px 10px rgba(0,0,0,0.06)',
      ...style,
    }}>
      {/* blur + tint */}
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 9999,
        backdropFilter: 'blur(12px) saturate(180%)',
        WebkitBackdropFilter: 'blur(12px) saturate(180%)',
        background: dark ? 'rgba(120,120,128,0.28)' : 'rgba(255,255,255,0.5)',
      }} />
      {/* shine */}
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 9999,
        boxShadow: dark
          ? 'inset 1.5px 1.5px 1px rgba(255,255,255,0.15), inset -1px -1px 1px rgba(255,255,255,0.08)'
          : 'inset 1.5px 1.5px 1px rgba(255,255,255,0.7), inset -1px -1px 1px rgba(255,255,255,0.4)',
        border: dark ? '0.5px solid rgba(255,255,255,0.15)' : '0.5px solid rgba(0,0,0,0.06)',
      }} />
      <div style={{ position: 'relative', zIndex: 1, display: 'flex', alignItems: 'center', padding: '0 4px' }}>
        {children}
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Navigation bar — glass pills + large title
// ─────────────────────────────────────────────────────────────
function IOSNavBar({ title = 'Title', dark = false, trailingIcon = true }) {
  const muted = dark ? 'rgba(255,255,255,0.6)' : '#404040';
  const text = dark ? '#fff' : '#000';
  const pillIcon = (content) => (
    <IOSGlassPill dark={dark}>
      <div style={{ width: 36, height: 36, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
        {content}
      </div>
    </IOSGlassPill>
  );
  return (
    <div style={{
      display: 'flex', flexDirection: 'column', gap: 10,
      paddingTop: 62, paddingBottom: 10, position: 'relative', zIndex: 5,
    }}>
      <div style={{
        display: 'flex', alignItems: 'center', justifyContent: 'space-between',
        padding: '0 16px',
      }}>
        {/* back chevron */}
        {pillIcon(
          <svg width="12" height="20" viewBox="0 0 12 20" fill="none" style={{ marginLeft: -1 }}>
            <path d="M10 2L2 10l8 8" stroke={muted} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
          </svg>
        )}
        {/* trailing ellipsis */}
        {trailingIcon && pillIcon(
          <svg width="22" height="6" viewBox="0 0 22 6">
            <circle cx="3" cy="3" r="2.5" fill={muted}/>
            <circle cx="11" cy="3" r="2.5" fill={muted}/>
            <circle cx="19" cy="3" r="2.5" fill={muted}/>
          </svg>
        )}
      </div>
      {/* large title */}
      <div style={{
        padding: '0 16px',
        fontFamily: '-apple-system, system-ui',
        fontSize: 34, fontWeight: 700, lineHeight: '41px',
        color: text, letterSpacing: 0.4,
      }}>{title}</div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Grouped list (inset card, r:26) + row (52px)
// ─────────────────────────────────────────────────────────────
function IOSListRow({ title, detail, icon, chevron = true, isLast = false, dark = false }) {
  const text = dark ? '#fff' : '#000';
  const sec = dark ? 'rgba(235,235,245,0.6)' : 'rgba(60,60,67,0.6)';
  const ter = dark ? 'rgba(235,235,245,0.3)' : 'rgba(60,60,67,0.3)';
  const sep = dark ? 'rgba(84,84,88,0.65)' : 'rgba(60,60,67,0.12)';
  return (
    <div style={{
      display: 'flex', alignItems: 'center', minHeight: 52,
      padding: '0 16px', position: 'relative',
      fontFamily: '-apple-system, system-ui', fontSize: 17,
      letterSpacing: -0.43,
    }}>
      {icon && (
        <div style={{
          width: 30, height: 30, borderRadius: 7, background: icon,
          marginRight: 12, flexShrink: 0,
        }} />
      )}
      <div style={{ flex: 1, color: text }}>{title}</div>
      {detail && <span style={{ color: sec, marginRight: 6 }}>{detail}</span>}
      {chevron && (
        <svg width="8" height="14" viewBox="0 0 8 14" style={{ flexShrink: 0 }}>
          <path d="M1 1l6 6-6 6" stroke={ter} strokeWidth="2" fill="none" strokeLinecap="round" strokeLinejoin="round"/>
        </svg>
      )}
      {!isLast && (
        <div style={{
          position: 'absolute', bottom: 0, right: 0,
          left: icon ? 58 : 16, height: 0.5, background: sep,
        }} />
      )}
    </div>
  );
}

function IOSList({ header, children, dark = false }) {
  const hc = dark ? 'rgba(235,235,245,0.6)' : 'rgba(60,60,67,0.6)';
  const bg = dark ? '#1C1C1E' : '#fff';
  return (
    <div>
      {header && (
        <div style={{
          fontFamily: '-apple-system, system-ui', fontSize: 13,
          color: hc, textTransform: 'uppercase',
          padding: '8px 36px 6px', letterSpacing: -0.08,
        }}>{header}</div>
      )}
      <div style={{
        background: bg, borderRadius: 26,
        margin: '0 16px', overflow: 'hidden',
      }}>{children}</div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Device frame
// ─────────────────────────────────────────────────────────────
function IOSDevice({
  children, width = 402, height = 874, dark = false,
  title, keyboard = false,
}) {
  return (
    <div style={{
      width, height, borderRadius: 48, overflow: 'hidden',
      position: 'relative', background: dark ? '#000' : '#F2F2F7',
      boxShadow: '0 40px 80px rgba(0,0,0,0.18), 0 0 0 1px rgba(0,0,0,0.12)',
      fontFamily: '-apple-system, system-ui, sans-serif',
      WebkitFontSmoothing: 'antialiased',
    }}>
      {/* dynamic island */}
      <div style={{
        position: 'absolute', top: 11, left: '50%', transform: 'translateX(-50%)',
        width: 126, height: 37, borderRadius: 24, background: '#000', zIndex: 50,
      }} />
      {/* status bar (absolute) */}
      <div style={{ position: 'absolute', top: 0, left: 0, right: 0, zIndex: 10 }}>
        <IOSStatusBar dark={dark} />
      </div>
      {/* nav + content */}
      <div style={{ height: '100%', display: 'flex', flexDirection: 'column' }}>
        {title !== undefined && <IOSNavBar title={title} dark={dark} />}
        <div style={{ flex: 1, overflow: 'auto' }}>{children}</div>
        {keyboard && <IOSKeyboard dark={dark} />}
      </div>
      {/* home indicator — always on top */}
      <div style={{
        position: 'absolute', bottom: 0, left: 0, right: 0, zIndex: 60,
        height: 34, display: 'flex', justifyContent: 'center', alignItems: 'flex-end',
        paddingBottom: 8, pointerEvents: 'none',
      }}>
        <div style={{
          width: 139, height: 5, borderRadius: 100,
          background: dark ? 'rgba(255,255,255,0.7)' : 'rgba(0,0,0,0.25)',
        }} />
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Keyboard — iOS 26 liquid glass
// ─────────────────────────────────────────────────────────────
function IOSKeyboard({ dark = false }) {
  const glyph = dark ? 'rgba(255,255,255,0.7)' : '#595959';
  const sugg = dark ? 'rgba(255,255,255,0.6)' : '#333';
  const keyBg = dark ? 'rgba(255,255,255,0.22)' : 'rgba(255,255,255,0.85)';

  // special-key icons
  const icons = {
    shift: <svg width="19" height="17" viewBox="0 0 19 17"><path d="M9.5 1L1 9.5h4.5V16h8V9.5H18L9.5 1z" fill={glyph}/></svg>,
    del: <svg width="23" height="17" viewBox="0 0 23 17"><path d="M7 1h13a2 2 0 012 2v11a2 2 0 01-2 2H7l-6-7.5L7 1z" fill="none" stroke={glyph} strokeWidth="1.6" strokeLinejoin="round"/><path d="M10 5l7 7M17 5l-7 7" stroke={glyph} strokeWidth="1.6" strokeLinecap="round"/></svg>,
    ret: <svg width="20" height="14" viewBox="0 0 20 14"><path d="M18 1v6H4m0 0l4-4M4 7l4 4" fill="none" stroke="#fff" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/></svg>,
  };

  const key = (content, { w, flex, ret, fs = 25, k } = {}) => (
    <div key={k} style={{
      height: 42, borderRadius: 8.5,
      flex: flex ? 1 : undefined, width: w, minWidth: 0,
      background: ret ? '#08f' : keyBg,
      boxShadow: '0 1px 0 rgba(0,0,0,0.075)',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      fontFamily: '-apple-system, "SF Compact", system-ui',
      fontSize: fs, fontWeight: 458, color: ret ? '#fff' : glyph,
    }}>{content}</div>
  );

  const row = (keys, pad = 0) => (
    <div style={{ display: 'flex', gap: 6.5, justifyContent: 'center', padding: `0 ${pad}px` }}>
      {keys.map(l => key(l, { flex: true, k: l }))}
    </div>
  );

  return (
    <div style={{
      position: 'relative', zIndex: 15, borderRadius: 27, overflow: 'hidden',
      padding: '11px 0 2px',
      display: 'flex', flexDirection: 'column', alignItems: 'center',
      boxShadow: dark
        ? '0 -2px 20px rgba(0,0,0,0.09)'
        : '0 -1px 6px rgba(0,0,0,0.018), 0 -3px 20px rgba(0,0,0,0.012)',
    }}>
      {/* liquid glass bg — same recipe as nav pills */}
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 27,
        backdropFilter: 'blur(12px) saturate(180%)',
        WebkitBackdropFilter: 'blur(12px) saturate(180%)',
        background: dark ? 'rgba(120,120,128,0.14)' : 'rgba(255,255,255,0.25)',
      }} />
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 27,
        boxShadow: dark
          ? 'inset 1.5px 1.5px 1px rgba(255,255,255,0.15)'
          : 'inset 1.5px 1.5px 1px rgba(255,255,255,0.7), inset -1px -1px 1px rgba(255,255,255,0.4)',
        border: dark ? '0.5px solid rgba(255,255,255,0.15)' : '0.5px solid rgba(0,0,0,0.06)',
        pointerEvents: 'none',
      }} />

      {/* autocorrect bar */}
      <div style={{
        display: 'flex', gap: 20, alignItems: 'center',
        padding: '8px 22px 13px', width: '100%', boxSizing: 'border-box',
        position: 'relative',
      }}>
        {['"The"', 'the', 'to'].map((w, i) => (
          <React.Fragment key={i}>
            {i > 0 && <div style={{ width: 1, height: 25, background: '#ccc', opacity: 0.3 }} />}
            <div style={{
              flex: 1, textAlign: 'center',
              fontFamily: '-apple-system, system-ui', fontSize: 17,
              color: sugg, letterSpacing: -0.43, lineHeight: '22px',
            }}>{w}</div>
          </React.Fragment>
        ))}
      </div>

      {/* key layout */}
      <div style={{
        display: 'flex', flexDirection: 'column', gap: 13,
        padding: '0 6.5px', width: '100%', boxSizing: 'border-box',
        position: 'relative',
      }}>
        {row(['q','w','e','r','t','y','u','i','o','p'])}
        {row(['a','s','d','f','g','h','j','k','l'], 20)}
        <div style={{ display: 'flex', gap: 14.25, alignItems: 'center' }}>
          {key(icons.shift, { w: 45, k: 'shift' })}
          <div style={{ display: 'flex', gap: 6.5, flex: 1 }}>
            {['z','x','c','v','b','n','m'].map(l => key(l, { flex: true, k: l }))}
          </div>
          {key(icons.del, { w: 45, k: 'del' })}
        </div>
        <div style={{ display: 'flex', gap: 6, alignItems: 'center' }}>
          {key('ABC', { w: 92.25, fs: 18, k: 'abc' })}
          {key('', { flex: true, k: 'space' })}
          {key(icons.ret, { w: 92.25, ret: true, k: 'ret' })}
        </div>
      </div>

      {/* bottom spacer (emoji+mic area, icons omitted) */}
      <div style={{ height: 56, width: '100%', position: 'relative' }} />
    </div>
  );
}

Object.assign(window, {
  IOSDevice, IOSStatusBar, IOSNavBar, IOSGlassPill, IOSList, IOSListRow, IOSKeyboard,
});


// ====== ui.jsx ======
// ui.jsx — small UI primitives: icons, sliders, chips, bottom sheet

const { useRef: uiUseRef, useEffect: uiUseEffect, useState: uiUseState } = React;

const COLORS = {
  bg: '#0A0A0B',
  bgElev: '#121214',
  line: 'rgba(255,255,255,0.08)',
  lineStrong: 'rgba(255,255,255,0.14)',
  fg: '#F2F2F0',
  dim: 'rgba(242,242,240,0.55)',
  dimmer: 'rgba(242,242,240,0.35)',
  accent: 'oklch(0.78 0.14 70)',
  accentDim: 'oklch(0.78 0.14 70 / 0.18)',
  rec: 'oklch(0.65 0.22 28)',
};

const FONT_MONO = '"JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, monospace';
const FONT_UI = '-apple-system, "SF Pro", Inter, system-ui, sans-serif';

// ─── Icons ─────────────────────────────────────────────
const Icon = ({ name, size = 20, color = 'currentColor', stroke = 1.6 }) => {
  const s = stroke;
  const common = { width: size, height: size, viewBox: '0 0 24 24', fill: 'none', stroke: color, strokeWidth: s, strokeLinecap: 'round', strokeLinejoin: 'round' };
  switch (name) {
    case 'flip': return <svg {...common}><path d="M15 3h4a2 2 0 012 2v4"/><path d="M9 21H5a2 2 0 01-2-2v-4"/><path d="M3 9V5a2 2 0 012-2h4"/><path d="M21 15v4a2 2 0 01-2 2h-4"/><path d="M8 12l-2-2 2-2"/><path d="M16 12l2 2-2 2"/></svg>;
    case 'close': return <svg {...common}><path d="M6 6l12 12M18 6L6 18"/></svg>;
    case 'settings': return <svg {...common}><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 11-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 11-2.83-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 112.83-2.83l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 112.83 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>;
    case 'grid': return <svg {...common}><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>;
    case 'gallery': return <svg {...common}><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>;
    case 'flash': return <svg {...common}><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>;
    case 'timer': return <svg {...common}><circle cx="12" cy="13" r="8"/><path d="M12 9v4l2 2M9 2h6"/></svg>;
    case 'bolt': return <svg {...common}><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>;
    case 'video': return <svg {...common}><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>;
    case 'camera': return <svg {...common}><path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/><circle cx="12" cy="13" r="4"/></svg>;
    case 'save': return <svg {...common}><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>;
    case 'chevron-down': return <svg {...common}><polyline points="6 9 12 15 18 9"/></svg>;
    case 'chevron-up': return <svg {...common}><polyline points="18 15 12 9 6 15"/></svg>;
    case 'plus': return <svg {...common}><path d="M12 5v14M5 12h14"/></svg>;
    case 'arrow-left': return <svg {...common}><path d="M19 12H5M12 19l-7-7 7-7"/></svg>;
    case 'check': return <svg {...common}><polyline points="20 6 9 17 4 12"/></svg>;
    case 'dot': return <svg width={size} height={size} viewBox="0 0 24 24"><circle cx="12" cy="12" r="5" fill={color}/></svg>;
    case 'target': return <svg {...common}><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>;

// ====== effects.jsx ======
// effects.jsx — six real recursion effects, all drawn to a 2D canvas using
// the previous frame as feedback. Each effect takes (ctx, videoEl, params, persistent)
// and renders one frame. `persistent` is an object the effect can mutate across frames.

const { useRef, useEffect, useState, useCallback } = React;

const EFFECTS = [
  { id: 'kaleido',   name: 'KALEIDO',   label: 'Kaleidoscope',        hint: 'Mirror tile symmetry' },
  { id: 'echo',      name: 'ECHO',      label: 'Feedback Delay',      hint: 'Video trails + decay' },
  { id: 'droste',    name: 'DROSTE',    label: 'Droste',              hint: 'Picture-in-picture spiral' },
  { id: 'tunnel',    name: 'TUNNEL',    label: 'Infinity Tunnel',     hint: 'Recursive zoom' },
  { id: 'poster',    name: 'POSTER',    label: 'Posterize Layers',    hint: 'Color-quantized stacking' },
  { id: 'slitscan',  name: 'SLIT',      label: 'Slit-Scan',           hint: 'Time per scanline' },
];

// Utility: draw video scaled "cover" into a target rect
function drawVideoCover(ctx, v, dx, dy, dw, dh) {
  if (!v || !v.videoWidth) return;
  const vr = v.videoWidth / v.videoHeight;
  const tr = dw / dh;
  let sx = 0, sy = 0, sw = v.videoWidth, sh = v.videoHeight;
  if (vr > tr) {
    sw = v.videoHeight * tr;
    sx = (v.videoWidth - sw) / 2;
  } else {
    sh = v.videoWidth / tr;
    sy = (v.videoHeight - sh) / 2;
  }
  ctx.drawImage(v, sx, sy, sw, sh, dx, dy, dw, dh);
}

// Kaleidoscope: draw a wedge, then reflect it N times
function renderKaleido(ctx, v, p) {
  const { width: w, height: h } = ctx.canvas;
  const slices = Math.max(3, Math.round(p.depth));
  const angle = (Math.PI * 2) / slices;
  const rot = (p.rotation * Math.PI) / 180;
  const scale = p.scale;
  const R = Math.hypot(w, h) / 2;

  ctx.save();
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, w, h);
  ctx.translate(w / 2, h / 2);
  ctx.rotate(rot);

  for (let i = 0; i < slices; i++) {
    ctx.save();
    ctx.rotate(i * angle);
    if (i % 2 === 1) ctx.scale(1, -1);
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.lineTo(R, -Math.tan(angle / 2) * R);
    ctx.lineTo(R, Math.tan(angle / 2) * R);
    ctx.closePath();
    ctx.clip();
    ctx.scale(scale, scale);
    drawVideoCover(ctx, v, -w / 2, -h / 2, w, h);
    ctx.restore();
  }
  ctx.restore();
}

// Echo: draw current frame on top of prior frame with fade
function renderEcho(ctx, v, p, per) {
  const { width: w, height: h } = ctx.canvas;
  // fade prior frame
  ctx.globalCompositeOperation = 'source-over';
  ctx.fillStyle = `rgba(0,0,0,${1 - p.opacity})`;
  ctx.fillRect(0, 0, w, h);
  // draw new frame with slight transform and blend
  ctx.globalCompositeOperation = p.blend || 'lighter';
  const s = p.scale;
  const rot = (p.rotation * Math.PI) / 180;
  ctx.save();
  ctx.translate(w / 2, h / 2);
  ctx.rotate(rot * 0.05);
  ctx.scale(s, s);
  ctx.globalAlpha = p.opacity;
  drawVideoCover(ctx, v, -w / 2, -h / 2, w, h);
  ctx.restore();
  ctx.globalCompositeOperation = 'source-over';
  ctx.globalAlpha = 1;
}

// Droste: recursive picture-in-picture. Redraw current canvas into a rotated/scaled window.
function renderDroste(ctx, v, p, per) {
  const { width: w, height: h } = ctx.canvas;
  drawVideoCover(ctx, v, 0, 0, w, h);
  const depth = Math.max(1, Math.round(p.depth));
  const s = Math.min(0.92, Math.max(0.3, p.scale * 0.7 + 0.3));
  const rot = (p.rotation * Math.PI) / 180;

  // snapshot current canvas once per frame
  if (!per.snap || per.snap.width !== w || per.snap.height !== h) {
    per.snap = document.createElement('canvas');
    per.snap.width = w;
    per.snap.height = h;
  }
  per.snap.getContext('2d').drawImage(ctx.canvas, 0, 0);

  for (let i = 1; i <= depth; i++) {
    ctx.save();
    ctx.translate(w / 2, h / 2);
    ctx.rotate(rot * i);
    const sc = Math.pow(s, i);
    ctx.scale(sc, sc);
    ctx.globalAlpha = Math.max(0.2, p.opacity);
    ctx.drawImage(per.snap, -w / 2, -h / 2, w, h);
    ctx.restore();
  }
  ctx.globalAlpha = 1;
}

// Tunnel: feedback loop — draw previous canvas scaled down/up from center, over new frame
function renderTunnel(ctx, v, p, per) {
  const { width: w, height: h } = ctx.canvas;
  if (!per.snap || per.snap.width !== w || per.snap.height !== h) {
    per.snap = document.createElement('canvas');
    per.snap.width = w;
    per.snap.height = h;
  }
  // snapshot previous frame
  per.snap.getContext('2d').drawImage(ctx.canvas, 0, 0);

  // new camera frame
  drawVideoCover(ctx, v, 0, 0, w, h);

  // overlay prior frame, zoomed in (tunnel-in) with slight rotation
  const zoom = 1 + 0.04 * p.speed;
  const rot = (p.rotation * Math.PI) / 180 * 0.1;
  const depth = Math.max(1, Math.round(p.depth));
  for (let i = 0; i < depth; i++) {
    ctx.save();
    ctx.translate(w / 2, h / 2);
    ctx.rotate(rot * (i + 1));
    const z = Math.pow(zoom, i + 1);
    ctx.scale(z, z);
    ctx.globalAlpha = p.opacity * Math.pow(0.85, i);
    ctx.globalCompositeOperation = p.blend || 'source-over';
    ctx.drawImage(per.snap, -w / 2, -h / 2, w, h);
    ctx.restore();
  }
  ctx.globalAlpha = 1;
  ctx.globalCompositeOperation = 'source-over';
}

// Posterize: quantize colors into N bands, stacked with offsets
function renderPoster(ctx, v, p, per) {
  const { width: w, height: h } = ctx.canvas;
  // draw base frame
  drawVideoCover(ctx, v, 0, 0, w, h);
  // quantize by reading pixels
  const bands = Math.max(2, Math.min(8, Math.round(p.depth)));
  const img = ctx.getImageData(0, 0, w, h);
  const d = img.data;
  const step = 255 / (bands - 1);
  for (let i = 0; i < d.length; i += 4) {
    d[i]     = Math.round(d[i] / step) * step;
    d[i + 1] = Math.round(d[i + 1] / step) * step;
    d[i + 2] = Math.round(d[i + 2] / step) * step;
  }
  ctx.putImageData(img, 0, 0);

  // stack rotated copies with blend
  if (!per.snap || per.snap.width !== w || per.snap.height !== h) {
    per.snap = document.createElement('canvas');
    per.snap.width = w;
    per.snap.height = h;
  }
  per.snap.getContext('2d').drawImage(ctx.canvas, 0, 0);
  const rot = (p.rotation * Math.PI) / 180;
  const layers = Math.max(1, Math.min(6, Math.round(p.depth - 1)));
  ctx.globalCompositeOperation = p.blend || 'screen';
  for (let i = 1; i <= layers; i++) {
    ctx.save();
    ctx.translate(w / 2, h / 2);
    ctx.rotate(rot * i * 0.3);
    const sc = Math.pow(p.scale, i * 0.3);
    ctx.scale(sc, sc);
    ctx.globalAlpha = p.opacity * 0.6;
    ctx.drawImage(per.snap, -w / 2, -h / 2, w, h);
    ctx.restore();
  }
  ctx.globalCompositeOperation = 'source-over';
  ctx.globalAlpha = 1;
}

// Slit-scan: each horizontal row comes from a different past frame
function renderSlitScan(ctx, v, p, per) {
  const { width: w, height: h } = ctx.canvas;
  const buffers = Math.max(4, Math.min(48, Math.round(p.depth * 4)));
  if (!per.history || per.history.length !== buffers) {
    per.history = [];
    for (let i = 0; i < buffers; i++) {
      const c = document.createElement('canvas');
      c.width = w; c.height = h;
      per.history.push(c);
    }
    per.cursor = 0;
  }
  // write current frame into rolling buffer
  const cur = per.history[per.cursor];
  cur.getContext('2d').drawImage(v, 0, 0, w, h);
  per.cursor = (per.cursor + 1) % per.history.length;

  // render each row from a different buffer based on its y
  const rowsPerBand = Math.max(1, Math.floor(h / per.history.length));
  for (let i = 0; i < per.history.length; i++) {
    const buf = per.history[(per.cursor + i) % per.history.length];
    const y = i * rowsPerBand;
    const rh = (i === per.history.length - 1) ? (h - y) : rowsPerBand;
    ctx.drawImage(buf, 0, y, w, rh, 0, y, w, rh);
  }
  // subtle overlay of live frame
  ctx.globalAlpha = Math.max(0, p.opacity - 0.5);
  drawVideoCover(ctx, v, 0, 0, w, h);
  ctx.globalAlpha = 1;
}

const RENDERERS = {
  kaleido: renderKaleido,
  echo: renderEcho,
  droste: renderDroste,
  tunnel: renderTunnel,
  poster: renderPoster,
  slitscan: renderSlitScan,
};

Object.assign(window, { EFFECTS, RENDERERS });

// app.jsx — main app: state, camera stream, render loop, capture/record, presets

const { useState: apUseState, useEffect: apUseEffect, useRef: apUseRef, useCallback: apUseCallback } = React;

const DEFAULT_PARAMS = {
  depth: 6,
  rotation: 12,
  scale: 0.92,
  opacity: 0.72,
  speed: 1,
  blend: 'source-over',
};

function App() {
  const [route, setRoute] = apUseState('permission'); // permission -> onboarding -> capture
  const [effect, setEffect] = apUseState('kaleido');
  const [params, setParams] = apUseState(DEFAULT_PARAMS);
  const [pickerOpen, setPickerOpen] = apUseState(false);
  const [panelOpen, setPanelOpen] = apUseState(false);
  const [galleryOpen, setGalleryOpen] = apUseState(false);
  const [facing, setFacing] = apUseState('user');
  const [usingDemo, setUsingDemo] = apUseState(false);
  const [captures, setCaptures] = apUseState([]);
  const [presets, setPresets] = apUseState([]);
  const [recording, setRecording] = apUseState(false);
  const [recStart, setRecStart] = apUseState(0);
  const [lastThumb, setLastThumb] = apUseState(null);

  const videoRef = apUseRef(null);
  const canvasRef = apUseRef(null);
  const streamRef = apUseRef(null);
  const rafRef = apUseRef(null);
  const perRef = apUseRef({}); // per-effect persistent state
  const recorderRef = apUseRef(null);
  const recChunksRef = apUseRef([]);

  const setParam = (k, v) => setParams(p => ({ ...p, [k]: v }));

  // Reset persistent state when effect changes
  apUseEffect(() => { perRef.current = {}; }, [effect]);

  // Load persisted presets
  apUseEffect(() => {
    try {
      const saved = JSON.parse(localStorage.getItem('recur.presets') || '[]');
      if (Array.isArray(saved)) setPresets(saved);
    } catch (e) {}
  }, []);

  const savePresets = (arr) => {
    setPresets(arr);
    try { localStorage.setItem('recur.presets', JSON.stringify(arr)); } catch (e) {}
  };

  // Start / restart camera
  const startCamera = apUseCallback(async (which) => {
    try {
      if (streamRef.current) {
        streamRef.current.getTracks().forEach(t => t.stop());
      }
      const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: which, width: { ideal: 1280 }, height: { ideal: 720 } },
        audio: false,
      });
      streamRef.current = stream;
      if (videoRef.current) {
        videoRef.current.srcObject = stream;
        await videoRef.current.play().catch(() => {});
      }
      setUsingDemo(false);
    } catch (err) {
      // fall back to demo gradient feed
      setUsingDemo(true);
      startDemoFeed();
    }
  }, []);

  const startDemoFeed = apUseCallback(() => {
    if (videoRef.current && videoRef.current.srcObject) {
      try { videoRef.current.srcObject.getTracks?.().forEach(t => t.stop()); } catch (e) {}
    }
    // Build an animated canvas, capture its stream as the "video"
    const c = document.createElement('canvas');
    c.width = 640; c.height = 1280;
    const cx = c.getContext('2d');
    let t0 = performance.now();
    const tick = () => {
      const t = (performance.now() - t0) / 1000;
      const g = cx.createLinearGradient(0, 0, c.width, c.height);
      g.addColorStop(0, `oklch(0.5 0.18 ${(t * 40) % 360})`);
      g.addColorStop(1, `oklch(0.3 0.2 ${(t * 40 + 120) % 360})`);
      cx.fillStyle = g;
      cx.fillRect(0, 0, c.width, c.height);
      // moving shapes
      for (let i = 0; i < 5; i++) {
        cx.fillStyle = `oklch(0.85 0.18 ${(t * 60 + i * 70) % 360} / 0.7)`;
        cx.beginPath();
        cx.arc(
          c.width / 2 + Math.cos(t + i) * 180,
          c.height / 2 + Math.sin(t * 0.8 + i) * 340,
          40 + 20 * Math.sin(t * 2 + i),
          0, Math.PI * 2
        );
        cx.fill();
      }
      // text marker
      cx.fillStyle = 'rgba(255,255,255,0.85)';
      cx.font = 'bold 32px monospace';
      cx.fillText('DEMO FEED', 30, 60);
      cx.font = '16px monospace';
      cx.fillText(`T+${t.toFixed(1)}s`, 30, 90);
      requestAnimationFrame(tick);
    };
    tick();
    const s = c.captureStream(30);
    if (videoRef.current) {
      videoRef.current.srcObject = s;
      videoRef.current.play().catch(() => {});
    }
    streamRef.current = s;
  }, []);

  // Render loop
  apUseEffect(() => {
    if (route !== 'capture') return;
    const v = videoRef.current;
    const canvas = canvasRef.current;
    if (!v || !canvas) return;
    const ctx = canvas.getContext('2d', { willReadFrequently: true });

    const resize = () => {
      const r = canvas.getBoundingClientRect();
      const dpr = Math.min(window.devicePixelRatio || 1, 2);
      canvas.width = Math.max(1, Math.round(r.width * dpr));
      canvas.height = Math.max(1, Math.round(r.height * dpr));
    };
    resize();
    const ro = new ResizeObserver(resize);
    ro.observe(canvas);

    const tick = () => {
      const r = RENDERERS[effect];
      if (r && v.videoWidth) {
        try { r(ctx, v, params, perRef.current); }
        catch (e) { /* ignore per-frame errors */ }
      } else {
        ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
      }
      rafRef.current = requestAnimationFrame(tick);
    };
    rafRef.current = requestAnimationFrame(tick);

    return () => {
      cancelAnimationFrame(rafRef.current);
      ro.disconnect();
    };
  }, [route, effect, params]);

  // Kick off camera when route enters capture
  apUseEffect(() => {
    if (route === 'capture') startCamera(facing);
    return () => {
      if (route !== 'capture' && streamRef.current) {
        streamRef.current.getTracks?.().forEach(t => t.stop());
      }
    };
  }, [route, facing, startCamera]);

  // Handlers — request camera in the tap handler so iOS shows the prompt
  const handleGrant = async () => {
    try {
      const s = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: facing, width: { ideal: 1280 }, height: { ideal: 720 } },
        audio: false,
      });
      streamRef.current = s;
      if (videoRef.current) {
        videoRef.current.srcObject = s;
        await videoRef.current.play().catch(() => {});
      }
      setUsingDemo(false);
      setRoute('onboarding');
    } catch (err) {
      console.warn('camera denied', err);
      setUsingDemo(true);
      startDemoFeed();
      setRoute('onboarding');
    }
  };
  const handleDecline = () => { setUsingDemo(true); startDemoFeed(); setRoute('onboarding'); };

  const handleShutter = () => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const url = canvas.toDataURL('image/png');
    const cap = { type: 'photo', url, effect, params: { ...params }, ts: Date.now() };
    setCaptures(cs => [cap, ...cs]);
    setLastThumb(url);
    // shutter flash
    flashShutter();
  };

  const handleToggleRecord = () => {
    if (recording) {
      recorderRef.current?.stop();
      return;
    }
    const canvas = canvasRef.current;
    if (!canvas || !canvas.captureStream) return;
    try {
      const stream = canvas.captureStream(30);
      const mr = new MediaRecorder(stream, { mimeType: 'video/webm;codecs=vp9' });
      recChunksRef.current = [];
      mr.ondataavailable = (e) => { if (e.data.size) recChunksRef.current.push(e.data); };
      mr.onstop = () => {
        const blob = new Blob(recChunksRef.current, { type: 'video/webm' });
        const url = URL.createObjectURL(blob);
        const cap = { type: 'video', url, effect, params: { ...params }, ts: Date.now() };
        setCaptures(cs => [cap, ...cs]);
        // capture a still thumbnail for the gallery button
        setLastThumb(canvas.toDataURL('image/jpeg', 0.6));
        setRecording(false);
      };
      mr.start();
      recorderRef.current = mr;
      setRecording(true);
      setRecStart(Date.now());
    } catch (err) {
      console.warn('record failed', err);
    }
  };

  const handleFlip = () => setFacing(f => f === 'user' ? 'environment' : 'user');

  const handleSavePreset = () => {
    const name = `PRESET ${String(presets.length + 1).padStart(2, '0')}`;
    savePresets([{ name, effect, params: { ...params }, ts: Date.now() }, ...presets]);
  };
  const handleLoadPreset = (p) => {
    setEffect(p.effect);
    setParams(p.params);
    setPanelOpen(false);
  };
  const handleDeletePreset = (i) => {
    savePresets(presets.filter((_, k) => k !== i));
  };

  const handleDeleteCapture = (i) => {
    setCaptures(cs => cs.filter((_, k) => k !== i));
  };

  // Shutter flash overlay
  const flashRef = apUseRef(null);
  const flashShutter = () => {
    if (!flashRef.current) return;
    const el = flashRef.current;
    el.style.transition = 'none';
    el.style.opacity = '0.9';
    requestAnimationFrame(() => {
      el.style.transition = 'opacity 0.35s ease';
      el.style.opacity = '0';
    });
  };

  return (
    <div style={{ position: 'absolute', inset: 0, background: '#000', overflow: 'hidden' }}>
      <CaptureView
        videoRef={videoRef}
        canvasRef={canvasRef}
        effect={effect}
        setEffect={setEffect}
        params={params}
        setParam={setParam}
        onOpenPicker={() => setPickerOpen(true)}
        onOpenPanel={() => setPanelOpen(true)}
        onOpenGallery={() => setGalleryOpen(true)}
        lastThumb={lastThumb}
        onShutter={handleShutter}
        onToggleRecord={handleToggleRecord}
        recording={recording}
        recStart={recStart}
        onFlipCam={handleFlip}
        facing={facing}
        usingDemo={usingDemo}
      />

      {/* Shutter flash */}
      <div ref={flashRef} style={{
        position: 'absolute', inset: 0, background: '#fff', opacity: 0,
        pointerEvents: 'none', zIndex: 200,
      }} />

      <EffectPickerSheet
        open={pickerOpen}
        current={effect}
        onPick={setEffect}
        onClose={() => setPickerOpen(false)}
      />

      <ControlPanelSheet
        open={panelOpen}
        params={params}
        onParam={setParam}
        onClose={() => setPanelOpen(false)}
        effect={EFFECTS.find(e => e.id === effect)}
        onSavePreset={handleSavePreset}
        presets={presets}
        onLoadPreset={handleLoadPreset}
        onDeletePreset={handleDeletePreset}
      />

      <GalleryScreen
        open={galleryOpen}
        items={captures}
        onClose={() => setGalleryOpen(false)}
        onDelete={handleDeleteCapture}
      />

      {route === 'permission' && (
        <PermissionScreen onGrant={handleGrant} onDecline={handleDecline} />
      )}
      {route === 'onboarding' && (
        <OnboardingScreen onDone={() => setRoute('capture')} />
      )}
    </div>
  );
}

Object.assign(window, { App });


</script>

<script type="text/babel">
  function Shell() {
    return (
      <div style={{
        position: 'absolute', inset: 0, background: '#000', overflow: 'hidden',
      }}>
        <App />
      </div>
    );
  }

  function waitThenRender() {
    if (!window.App) {
      setTimeout(waitThenRender, 50);
      return;
    }
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<Shell />);
  }
  waitThenRender();
</script>

</body>
</html>
